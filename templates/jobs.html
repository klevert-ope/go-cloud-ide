{{range .}}
<div style="border:1px solid #ccc; padding:10px; margin:10px;">
    <p><strong>ID:</strong> {{.ID}}</p>

    <a href="/ws/{{.ID}}" target="_blank">
        Open Workspace
    </a>

    <button
            hx-delete="/delete?id={{.ID}}"
            hx-target="#jobs"
            hx-swap="innerHTML">
        Delete
    </button>
</div>
{{else}}
<p>No active workspaces</p>
{{end}}
