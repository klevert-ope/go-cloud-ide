<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cloud IDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #4a5568; }
        .navbar-brand { font-weight: 600; }
        .workspace-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .workspace-card:hover { transform: translateY(-2px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important; }
        .btn-create { background-color: #3182ce; border: none; }
        .btn-create:hover { background-color: #2c5282; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-cloud-code me-2"></i>Cloud IDE</span>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 text-secondary">Workspaces</h4>
        <button class="btn btn-primary btn-create" hx-post="/workspaces" hx-target="#jobs" hx-swap="innerHTML">
            <i class="bi bi-plus-lg me-1"></i>Create Workspace
        </button>
    </div>

    <div id="jobs"
         class="row g-3"
         hx-get="/ui/workspaces"
         hx-trigger="load, every 5s">
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
</body>
</html>
